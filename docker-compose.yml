# Déploiement local / VPS : http://IP:3000
# Base persistante : volume Docker `rkcase-data` → /data/dev.db
#
#   docker compose up -d --build
#
# Puis ouvre le port 3000 sur le pare-feu (ufw allow 3000 / security group cloud).

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:/data/dev.db"
      NODE_ENV: production
    volumes:
      - rkcase-data:/data
    restart: unless-stopped

volumes:
  rkcase-data:
